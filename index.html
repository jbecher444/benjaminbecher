<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benjamin Becher — Games</title>
<style>
  :root {
    --bg: #0a0a12;
    --panel: #14141f;
    --ink: #e8e8f0;
    --muted: #8a8aa0;
    --accent: #4ad6ff;
    --accent2: #ff5a87;
    --line: #26263a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1a1a2e 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: 'Courier New', ui-monospace, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6vh 20px 40px;
  }
  header { text-align: center; margin-bottom: 8px; }
  h1 {
    font-size: clamp(34px, 7vw, 64px);
    letter-spacing: 4px;
    text-shadow: 0 0 18px rgba(74,214,255,0.35);
  }
  .tag { color: var(--muted); margin-top: 10px; font-size: 15px; letter-spacing: 1px; }
  .grid {
    margin-top: 48px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 22px;
    width: 100%;
    max-width: 760px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .card.live:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 10px 30px rgba(74,214,255,0.15);
  }
  .card .icon { font-size: 34px; }
  .card h2 { font-size: 22px; letter-spacing: 1px; }
  .card p { color: var(--muted); font-size: 14px; line-height: 1.5; }
  .badge {
    align-self: flex-start;
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    border-radius: 999px;
    margin-top: 4px;
  }
  .badge.play { background: rgba(74,214,255,0.15); color: var(--accent); border: 1px solid rgba(74,214,255,0.4); }
  .badge.soon { background: rgba(138,138,160,0.12); color: var(--muted); border: 1px solid var(--line); }
  .card.soon { opacity: 0.7; cursor: default; }
  footer { margin-top: auto; padding-top: 50px; color: var(--muted); font-size: 12px; letter-spacing: 1px; }
</style>
</head>
<body>
  <header>
    <h1>BENJAMIN BECHER</h1>
    <div class="tag">A little arcade of games we built together.</div>
  </header>

  <main class="grid">
    <a class="card live" href="air-soldier.html">
      <div class="icon">✈️</div>
      <h2>Air Soldier</h2>
      <p>Fast-paced aerial shooter. Dodge, fire, and chase the high score.</p>
      <span class="badge play">▶ PLAY</span>
    </a>

    <div class="card soon">
      <div class="icon">🏘️</div>
      <h2>Build a Village</h2>
      <p>Gather, build, and grow your own little settlement.</p>
      <span class="badge soon">COMING SOON</span>
    </div>
  </main>

  <footer>benjaminbecher.com</footer>
</body>
</html>
